<svg viewBox="0 0 600 750" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <!-- Paper background -->
  <rect width="600" height="750" fill="#F5F4F1"/>

  <!-- Subtle grid -->
  <defs>
    <pattern id="archGrid" width="25" height="25" patternUnits="userSpaceOnUse">
      <path d="M25 0H0V25" fill="none" stroke="#E2E1DC" stroke-width="0.4"/>
    </pattern>
  </defs>
  <rect width="600" height="750" fill="url(#archGrid)" opacity="0.55"/>

  <!-- Top right: golden seal / sun -->
  <circle cx="510" cy="115" r="42" fill="#C8A96E" opacity="0.12"/>
  <circle cx="510" cy="115" r="42" fill="none" stroke="#C8A96E" stroke-width="0.8"/>
  <text x="510" y="124" font-family="'Cormorant Garamond', serif" font-size="22" font-style="italic" fill="#0C0C0C" text-anchor="middle">A.01</text>

  <!-- Top left: section title -->
  <g font-family="'Jost', sans-serif" fill="#9A9990">
    <text x="60" y="98" font-size="9" letter-spacing="3">SECCIÓN A — A</text>
    <text x="60" y="115" font-size="8" letter-spacing="2">ESC 1 : 50</text>
    <line x1="60" y1="125" x2="200" y2="125" stroke="#9A9990" stroke-width="0.5"/>
  </g>

  <!-- Modern house section / facade -->
  <g stroke="#0C0C0C" fill="none" stroke-linejoin="miter">
    <!-- Outer outline -->
    <rect x="170" y="280" width="260" height="320" stroke-width="1.4"/>

    <!-- Flat roof with overhang -->
    <line x1="150" y1="280" x2="450" y2="280" stroke-width="2"/>

    <!-- Floor division -->
    <line x1="170" y1="440" x2="430" y2="440" stroke-width="1"/>

    <!-- LEVEL 2 — Big central window (double height vertical) -->
    <rect x="275" y="300" width="50" height="125" stroke-width="1"/>
    <line x1="300" y1="300" x2="300" y2="425" stroke-width="0.6"/>

    <!-- LEVEL 2 — Side windows -->
    <rect x="195" y="305" width="55" height="55" stroke-width="1"/>
    <line x1="222" y1="305" x2="222" y2="360" stroke-width="0.6"/>
    <rect x="350" y="305" width="55" height="55" stroke-width="1"/>
    <line x1="377" y1="305" x2="377" y2="360" stroke-width="0.6"/>

    <!-- LEVEL 2 — Balcony rails -->
    <line x1="195" y1="385" x2="250" y2="385" stroke-width="0.8"/>
    <line x1="350" y1="385" x2="405" y2="385" stroke-width="0.8"/>

    <!-- LEVEL 1 — Living room big window -->
    <rect x="190" y="465" width="80" height="105" stroke-width="1"/>
    <line x1="217" y1="465" x2="217" y2="570" stroke-width="0.6"/>
    <line x1="244" y1="465" x2="244" y2="570" stroke-width="0.6"/>

    <!-- LEVEL 1 — Front door -->
    <rect x="285" y="488" width="35" height="112" stroke-width="1.2"/>
    <line x1="302" y1="488" x2="302" y2="600" stroke-width="0.5"/>

    <!-- LEVEL 1 — Right window -->
    <rect x="340" y="465" width="70" height="105" stroke-width="1"/>
    <line x1="375" y1="465" x2="375" y2="570" stroke-width="0.6"/>

    <!-- Ground line -->
    <line x1="60" y1="600" x2="540" y2="600" stroke-width="1.5"/>
    <line x1="60" y1="605" x2="540" y2="605" stroke-width="0.4"/>

    <!-- Foundation hatch -->
    <line x1="80" y1="612" x2="60" y2="630" stroke-width="0.4" stroke="#9A9990"/>
    <line x1="120" y1="612" x2="100" y2="630" stroke-width="0.4" stroke="#9A9990"/>
    <line x1="160" y1="612" x2="140" y2="630" stroke-width="0.4" stroke="#9A9990"/>
    <line x1="200" y1="612" x2="180" y2="630" stroke-width="0.4" stroke="#9A9990"/>
    <line x1="240" y1="612" x2="220" y2="630" stroke-width="0.4" stroke="#9A9990"/>
    <line x1="280" y1="612" x2="260" y2="630" stroke-width="0.4" stroke="#9A9990"/>
    <line x1="320" y1="612" x2="300" y2="630" stroke-width="0.4" stroke="#9A9990"/>
    <line x1="360" y1="612" x2="340" y2="630" stroke-width="0.4" stroke="#9A9990"/>
    <line x1="400" y1="612" x2="380" y2="630" stroke-width="0.4" stroke="#9A9990"/>
    <line x1="440" y1="612" x2="420" y2="630" stroke-width="0.4" stroke="#9A9990"/>
    <line x1="480" y1="612" x2="460" y2="630" stroke-width="0.4" stroke="#9A9990"/>
    <line x1="520" y1="612" x2="500" y2="630" stroke-width="0.4" stroke="#9A9990"/>
  </g>

  <!-- Vertical measurement (left side) — gold -->
  <g stroke="#C8A96E" fill="none" stroke-width="0.7">
    <line x1="120" y1="280" x2="120" y2="600"/>
    <line x1="115" y1="280" x2="125" y2="280"/>
    <line x1="115" y1="440" x2="125" y2="440"/>
    <line x1="115" y1="600" x2="125" y2="600"/>
  </g>
  <g fill="#C8A96E">
    <circle cx="120" cy="280" r="2.5"/>
    <circle cx="120" cy="440" r="2.5"/>
    <circle cx="120" cy="600" r="2.5"/>
  </g>

  <!-- Vertical level labels -->
  <g font-family="'Jost', sans-serif" font-size="9" fill="#6B6A62" letter-spacing="1">
    <text x="105" y="284" text-anchor="end">+6.40</text>
    <text x="105" y="444" text-anchor="end">+3.20</text>
    <text x="105" y="604" text-anchor="end">±0.00</text>
  </g>

  <!-- Horizontal measurement (bottom) — gold -->
  <g stroke="#C8A96E" fill="none" stroke-width="0.7">
    <line x1="170" y1="665" x2="430" y2="665"/>
    <line x1="170" y1="660" x2="170" y2="670"/>
    <line x1="430" y1="660" x2="430" y2="670"/>
  </g>
  <g font-family="'Jost', sans-serif" font-size="10" fill="#6B6A62" letter-spacing="2">
    <text x="300" y="685" text-anchor="middle">8.50 m</text>
  </g>

  <!-- Bottom: brand mark -->
  <g font-family="'Cormorant Garamond', serif">
    <line x1="60" y1="708" x2="200" y2="708" stroke="#0C0C0C" stroke-width="0.6"/>
    <text x="60" y="722" font-size="9" font-family="'Jost', sans-serif" fill="#9A9990" letter-spacing="2">PROYECTO RESIDENCIAL · 2026</text>
    <text x="540" y="722" font-size="16" font-style="italic" fill="#0C0C0C" text-anchor="end" font-weight="400">ArchPortal</text>
  </g>
</svg>
